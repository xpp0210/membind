services:
  membind:
    build: ..
    ports:
      - "8901:8901"
    env_file:
      - ../.env
    volumes:
      - membind-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8901/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  membind-data:
